# Single source of truth for swarm-* subagent model bindings.
#
# Edit THIS file when the Qoder model catalog changes, then run:
#   python3 scripts/sync-models.py            # validate + propagate everywhere
#   python3 scripts/sync-models.py --check    # dry-run, non-zero exit on drift (CI)
#   python3 scripts/sync-models.py --auto-fix # remap vanished models, then sync
#
# Propagates to: agents/swarm-*.md frontmatter (model:/fallback_models:),
# ~/.qoder/agents/, README.md + skills/swarm/references/_shared.md tables,
# scripts/swarm-cost-qoder.py (reads this file at runtime).
#
# Fields per role:
#   model           primary model, must match `qodercli --list-models` exactly
#   fallback_models ordered retry list (orchestrator honors on primary failure)
#   cost            credit multiplier (see /model in TUI)
#   why             one-line role summary used in generated doc tables

swarm-explorer:
  model: Peach-07-17-DogFooding
  fallback_models: [GLM-5.2]
  cost: 0.00
  why: read-only codebase search

